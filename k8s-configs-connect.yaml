apiVersion: platform.confluent.io/v1beta1
kind: Kafka
metadata:
  name: kafka
  namespace: confluent
spec:
  replicas: 3
  image:
    application: confluentinc/cp-server:7.5.0
    init: confluentinc/confluent-init-container:2.8.0
  dataVolumeCapacity: 10Gi
  listeners:
    # 1. mTLS (Internal) - Covers "Auto-generated" certificates
    internal:
      authentication:
        type: mtls
      tls:
        enabled: true
    # 2. SASL/PLAIN with SSL (External) - Covers "SASL/PLAIN with SSL"
    external:
      authentication:
        type: plain
      tls:
        enabled: true
    # 3. mTLS (User-provided) - Demonstrates "User-provided certificates" via Secret
    # (Note: In a real cluster, you switch the 'internal' listener to this spec)
    # secretRef: my-tls-secret 
  dependencies:
    zookeeper:
      endpoint: zookeeper.confluent.svc.cluster.local:2181
apiVersion: platform.confluent.io/v1beta1
kind: Zookeeper
metadata:
  name: zookeeper
  namespace: confluent
spec:
  replicas: 3
  image:
    application: confluentinc/cp-zookeeper:7.5.0
    init: confluentinc/confluent-init-container:2.8.0
  dataVolumeCapacity: 10Gi
  logVolumeCapacity: 10Gi
  
